<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Asfahas Barbershop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="section admin-section">
    <div class="section-heading">
        <p class="tag">Admin</p>
        <h1>Asfahas Barbershop</h1>
        <p class="section-subtitle">Privat adminpanel för galleri och Instagram-captions.</p>
    </div>

    <div id="loginBox" class="info-box admin-box">
        <h2>Logga in</h2>

        <label for="email">E-post</label>
        <input type="email" id="email" placeholder="E-post">

        <label for="password">Lösenord</label>
        <input type="password" id="password" placeholder="Lösenord">

        <button id="loginBtn" class="main-btn">Logga in</button>

        <p id="loginMessage" class="admin-message"></p>
    </div>

    <div id="adminPanel" class="info-box admin-box hidden">
        <h2>Adminpanel</h2>
        <p>Du är inloggad.</p>

        <div class="admin-actions">
            <button id="testFirestoreBtn" class="main-btn">Testa Firebase</button>
            <button id="logoutBtn" class="second-btn">Logga ut</button>
        </div>

        <p id="adminMessage" class="admin-message"></p>

        <hr>

        <h3>Nästa steg</h3>
        <p>
            Här kommer vi senare lägga till bilduppladdning, galleri-hantering
            och AI-caption generator för Instagram.
        </p>
    </div>
</section>

<script type="module" src="admin.js"></script>
</body>
</html>
